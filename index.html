<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080808">
  <title>PhotoTake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --bg2:     #111;
      --line:    #222;
      --muted:   #555;
      --sub:     #999;
      --text:    #f0f0f0;
      --accent:  #f0f0f0;
      --gold:    #f5c518;
      --gold2:   #d4a800;
      --ok:      #3ecf8e;
      --r: 12px;
    }

    html, body {
      height: 100%; max-height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .hdr-logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .hdr-logo h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .hdr-logo .ver {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
    }

    .pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: none;
    }
    .pill.ready  { color: var(--ok);   border-color: var(--ok); }
    .pill.loading{ color: var(--gold); border-color: var(--gold); animation: blink 1.4s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 11px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color .18s, border-color .18s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── Panels ── */
    main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    .panel { flex: 1; min-height: 0; display: none; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ── Camera ── */
    #cam-panel { overflow: hidden; }

    .cam-vp {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #video { width: 100%; height: 100%; object-fit: cover; display: block; }

    #ov-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .cam-hint {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(8,8,8,.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 12px;
      color: rgba(240,240,240,.75);
      white-space: nowrap;
      pointer-events: none;
    }

    .cam-dot {
      position: absolute;
      top: 16px; right: 16px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    .cam-dot.found { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .cam-dot.scan  { background: var(--gold); animation: blink 1s infinite; }

    .cam-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--line);
    }

    .ico-btn {
      width: 44px; height: 44px;
      flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      color: var(--sub);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .ico-btn:active { background: #1a1a1a; color: var(--text); }

    .cap-btn {
      flex: 1;
      height: 48px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .cap-btn:active { background: var(--gold2); transform: scale(.98); }
    .cap-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Process ── */
    #proc-panel { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .proc-body { display: flex; flex-direction: column; }

    .sec-label {
      padding: 16px 20px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .img-block {
      background: #000;
      display: flex; align-items: center; justify-content: center;
      min-height: 160px;
    }

    .img-block canvas, .img-block img {
      max-width: 100%;
      max-height: 320px;
      display: block;
      object-fit: contain;
    }

    .empty-msg {
      padding: 40px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .divider { height: 1px; background: var(--line); margin: 0 20px; }
    .divider-full { height: 1px; background: var(--line); }

    /* ── Manual crop ── */
    #manual-sec { display: none; }

    #manual-stage {
      position: relative;
      display: inline-block;
      line-height: 0;
      touch-action: none;
      user-select: none;
      overflow: visible;
    }

    #manual-canvas { max-width: 100%; display: block; }

    #manual-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: visible;
    }

    .c-dot {
      position: absolute;
      width: 26px; height: 26px;
      background: var(--gold);
      border: 2px solid #000;
      border-radius: 50%;
      transform: translate(-50%,-50%);
      cursor: grab;
      touch-action: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.6);
    }
    .c-dot:active { cursor: grabbing; transform: translate(-50%,-50%) scale(1.2); }

    /* ── Loupe ── */
    #loupe {
      position: fixed;
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      overflow: hidden;
      pointer-events: none;
      display: none;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,.7);
    }
    #loupe canvas { display: block; }

    .manual-note {
      padding: 10px 20px 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Sliders ── */
    /* ── Negative toggles ── */
    .neg-row {
      display: flex;
      gap: 8px;
      padding: 12px 20px 4px;
    }

    .neg-btn {
      flex: 1;
      height: 38px;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .neg-btn.active {
      background: var(--text);
      color: #000;
      border-color: var(--text);
    }

    .sliders { padding: 4px 20px 16px; display: flex; flex-direction: column; gap: 14px; }

    .sl-row { display: flex; align-items: center; gap: 12px; }
    .sl-lbl { font-size: 12px; color: var(--sub); width: 68px; flex-shrink: 0; }

    input[type=range] {
      flex: 1;
      height: 3px;
      accent-color: var(--text);
      cursor: pointer;
      background: var(--line);
      border-radius: 2px;
    }

    .sl-val { font-size: 12px; color: var(--sub); width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Action row ── */
    .act-row {
      display: flex; gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--line);
    }

    .btn {
      flex: 1; height: 46px;
      border: none; border-radius: var(--r);
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn-outline { background: none; color: var(--sub); border: 1px solid var(--line); }
    .btn-solid   { background: var(--gold); color: #000; }
    .btn-solid:active { background: var(--gold2); }
    .btn-sm {
      height: 30px; padding: 0 12px; flex: 0;
      font-size: 12px; font-weight: 600;
      background: var(--bg2); color: var(--sub);
      border: 1px solid var(--line);
      border-radius: 8px; cursor: pointer;
      transition: color .15s;
    }
    .btn-sm:active { color: var(--text); }

    /* ── Gallery ── */
    #gal-panel { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .gal-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--line);
      margin-top: 1px;
    }

    .gal-item {
      position: relative;
      aspect-ratio: 4/3;
      background: var(--bg2);
      cursor: pointer;
      overflow: hidden;
    }
    .gal-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .gal-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(transparent 55%, rgba(0,0,0,.8));
    }

    .gal-date {
      position: absolute;
      bottom: 8px; left: 10px;
      font-size: 10px;
      color: rgba(255,255,255,.55);
      letter-spacing: .3px;
    }

    .gal-acts {
      position: absolute;
      top: 6px; right: 6px;
      display: flex; gap: 4px;
      opacity: 0;
      transition: opacity .2s;
    }
    .gal-item:hover .gal-acts { opacity: 1; }

    .gal-act-btn {
      width: 28px; height: 28px;
      background: rgba(0,0,0,.65);
      border: none; border-radius: 6px;
      color: #fff; font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .gal-empty {
      grid-column: 1/-1;
      padding: 64px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(20,20,20,.95);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 9px 18px;
      font-size: 12px; color: var(--text);
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 100;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Loader ── */
    #loader {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      z-index: 200;
    }
    #loader.on { display: flex; }

    .spin {
      width: 36px; height: 36px;
      border: 2px solid var(--line);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-txt { font-size: 13px; color: var(--sub); }
  </style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-logo">
    <h1>PhotoTake</h1>
    <span class="ver">v1.9</span>
  </div>
  <span class="pill loading" id="cv-status">Cargando…</span>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="cam">Cámara</button>
  <button class="tab" data-tab="proc">Procesar</button>
  <button class="tab" data-tab="gal">Galería <span id="gal-n">0</span></button>
</div>

<main>

  <!-- ── CAMERA ── -->
  <div class="panel active" id="cam-panel">
    <div class="cam-vp">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="ov-canvas"></canvas>
      <div class="cam-hint" id="cam-hint">Apunta a una foto revelada</div>
      <div class="cam-dot scan" id="cam-dot"></div>
    </div>
    <div class="cam-bar">
      <button class="ico-btn" id="btn-flip">↺</button>
      <button class="cap-btn" id="btn-cap" disabled>Capturar</button>
      <button class="ico-btn" id="btn-torch">⚡</button>
    </div>
  </div>

  <!-- ── PROCESS ── -->
  <div class="panel" id="proc-panel">
    <div class="proc-body">

      <div class="sec-label">
        Resultado
        <span id="det-lbl" style="font-size:11px;font-weight:500;color:var(--muted)">—</span>
      </div>

      <div class="img-block" id="result-wrap">
        <div class="empty-msg">Captura una foto para empezar</div>
      </div>

      <div class="neg-row">
        <button class="neg-btn" id="tog-bw">Negativo B&amp;N</button>
        <button class="neg-btn" id="tog-color">Negativo Color</button>
      </div>

      <div class="sliders" id="adj-panel">
        <div class="sl-row">
          <span class="sl-lbl">Brillo</span>
          <input type="range" id="sl-b" min="-100" max="100" value="0">
          <span class="sl-val" id="vl-b">0</span>
        </div>
        <div class="sl-row">
          <span class="sl-lbl">Contraste</span>
          <input type="range" id="sl-c" min="-100" max="100" value="0">
          <span class="sl-val" id="vl-c">0</span>
        </div>
        <div class="sl-row">
          <span class="sl-lbl">Saturación</span>
          <input type="range" id="sl-s" min="-100" max="100" value="0">
          <span class="sl-val" id="vl-s">0</span>
        </div>
      </div>

      <div class="divider-full"></div>

      <!-- Manual crop -->
      <div id="manual-sec">
        <div class="sec-label">
          Ajuste manual
          <button class="btn-sm" id="btn-apply-man">Aplicar recorte</button>
        </div>
        <div class="img-block" style="display:block;text-align:center;overflow:visible;padding:14px 0">
          <div id="manual-stage">
            <canvas id="manual-canvas"></canvas>
            <svg id="manual-svg" xmlns="http://www.w3.org/2000/svg">
              <polygon id="manual-poly" fill="rgba(245,197,24,.1)" stroke="#f5c518" stroke-width="1.5" stroke-dasharray="6,3" points=""/>
            </svg>
          </div>
        </div>
        <div class="manual-note">Arrastra las esquinas para definir el área</div>
        <div class="divider-full"></div>
      </div>

      <div class="act-row">
        <button class="btn btn-outline" id="btn-retake">Repetir</button>
        <button class="btn btn-solid"   id="btn-save" disabled>Guardar</button>
      </div>

    </div>
  </div>

  <!-- ── GALLERY ── -->
  <div class="panel" id="gal-panel">
    <div class="gal-grid" id="gal-grid">
      <div class="gal-empty">Sin fotos aún.<br>Captura tu primera foto revelada.</div>
    </div>
  </div>

</main>

<div id="toast"></div>
<div id="loader"><div class="spin"></div><div class="loader-txt" id="loader-txt">Procesando…</div></div>
<div id="loupe"><canvas id="loupe-canvas"></canvas></div>

<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onCvReady()"></script>
<script>
// ─────────────────────────────────────────────
//  HELPERS  (must be first — used throughout)
// ─────────────────────────────────────────────
const el = id => document.getElementById(id);
const makeCanvas = (w, h) => { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; };
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const on  = (t, ev, fn, opt) => ev.split(' ').forEach(e => t.addEventListener(e, fn, opt));
const off = (t, ev, fn)      => ev.split(' ').forEach(e => t.removeEventListener(e, fn));
const setDot    = cls => el('cam-dot').className = 'cam-dot ' + cls;
const setStatus = (txt, cls) => { const s = el('cv-status'); s.textContent = txt; s.className = 'pill ' + cls; };

let toastTmr;
function toast(msg) {
  const t = el('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTmr); toastTmr = setTimeout(() => t.classList.remove('show'), 2800);
}
function showLoader(msg) { el('loader-txt').textContent = msg; el('loader').classList.add('on'); }
function hideLoader()    { el('loader').classList.remove('on'); }

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const S = {
  cvReady: false,
  stream: null,
  facing: 'environment',
  torch: false,
  srcCanvas: null,       // raw capture
  baseCanvas: null,      // perspective-corrected (no adjustments)
  adj: { b: 0, c: 0, s: 0 },
  negMode: null,   // null | 'bw' | 'color'
  gallery: JSON.parse(localStorage.getItem('pt_gal') || '[]'),
};

// ─────────────────────────────────────────────
//  OPENCV
// ─────────────────────────────────────────────
function onCvReady() {
  S.cvReady = true;
  setStatus('Listo', 'ready');
  el('btn-cap').disabled = false;
  startCam();
}

// ─────────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────────
async function startCam() {
  stopCam();
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: S.facing, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    const v = el('video');
    v.srcObject = S.stream;
    await v.play();
    startLoop();
  } catch (e) { toast('Cámara: ' + e.message); }
}

function stopCam() {
  stopLoop();
  S.stream?.getTracks().forEach(t => t.stop());
  S.stream = null;
}

// ─────────────────────────────────────────────
//  DETECTION LOOP + EMA SMOOTHING
// ─────────────────────────────────────────────
let rafId = null;
let smoothed = null;
let missFrames = 0;
const ALPHA = 0.14;       // EMA factor — lower = smoother
const MISS_MAX = 12;      // frames before clearing overlay

function startLoop() {
  stopLoop();
  const video = el('video');
  const canvas = el('ov-canvas');

  function loop() {
    if (!S.cvReady || video.readyState < 2) { rafId = requestAnimationFrame(loop); return; }

    const vw = video.videoWidth, vh = video.videoHeight;
    canvas.width = vw; canvas.height = vh;

    const tmp = makeCanvas(vw, vh);
    tmp.getContext('2d').drawImage(video, 0, 0);

    const raw = detectCorners(tmp);
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, vw, vh);

    if (raw) {
      missFrames = 0;
      smoothed = smoothed
        ? smoothed.map((s, i) => ({ x: s.x + ALPHA * (raw[i].x - s.x), y: s.y + ALPHA * (raw[i].y - s.y) }))
        : raw.map(p => ({ ...p }));
      S.detectedCorners = smoothed;
      drawOverlay(ctx, smoothed, vw);
      setDot('found');
      el('cam-hint').textContent = '✓ Detectada — captura cuando quieras';
    } else {
      missFrames++;
      if (missFrames > MISS_MAX) {
        smoothed = null; S.detectedCorners = null;
        setDot('scan');
        el('cam-hint').textContent = 'Apunta a una foto revelada';
      } else if (smoothed) {
        drawOverlay(ctx, smoothed, vw);
      }
    }
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function stopLoop() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

function drawOverlay(ctx, pts, vw) {
  ctx.save();
  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,197,24,.1)';
  ctx.fill();
  ctx.strokeStyle = '#f5c518';
  ctx.lineWidth = Math.max(2, vw * 0.0025);
  ctx.stroke();
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(5, vw * 0.007), 0, Math.PI * 2);
    ctx.fillStyle = '#f5c518';
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
  ctx.restore();
}

// ─────────────────────────────────────────────
//  CORNER DETECTION (OpenCV)
// ─────────────────────────────────────────────
function detectCorners(srcCanvas) {
  try {
    const src = cv.imread(srcCanvas);
    const gray = new cv.Mat(), blur = new cv.Mat();
    const edges = new cv.Mat(), dil = new cv.Mat();
    const cnts = new cv.MatVector(), hier = new cv.Mat();

    const MAX = 800;
    const sc = Math.min(1, MAX / Math.max(src.rows, src.cols));
    const small = new cv.Mat();
    cv.resize(src, small, new cv.Size(Math.round(src.cols * sc), Math.round(src.rows * sc)));

    cv.cvtColor(small, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
    cv.Canny(blur, edges, 50, 150);

    const k = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
    cv.dilate(edges, dil, k); k.delete();

    cv.findContours(dil, cnts, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let best = null, bestArea = 0;
    const imgArea = small.rows * small.cols;

    for (let i = 0; i < cnts.size(); i++) {
      const cnt = cnts.get(i);
      const peri = cv.arcLength(cnt, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

      if (approx.rows === 4) {
        const area = Math.abs(cv.contourArea(approx));
        if (area > imgArea * 0.05 && area < imgArea * 0.97 && area > bestArea) {
          const pts = [];
          for (let j = 0; j < 4; j++)
            pts.push({ x: approx.data32S[j * 2] / sc, y: approx.data32S[j * 2 + 1] / sc });
          best = orderCorners(pts);
          bestArea = area;
        }
      }
      approx.delete(); cnt.delete();
    }

    [src, gray, blur, edges, dil, cnts, hier, small].forEach(m => m.delete());
    return best;
  } catch { return null; }
}

// TL = min(x+y), TR = max(x−y), BR = max(x+y), BL = min(x−y)
function orderCorners(pts) {
  const tl = pts.reduce((b, p) => p.x + p.y < b.x + b.y ? p : b);
  const br = pts.reduce((b, p) => p.x + p.y > b.x + b.y ? p : b);
  const tr = pts.reduce((b, p) => p.x - p.y > b.x - b.y ? p : b);
  const bl = pts.reduce((b, p) => p.x - p.y < b.x - b.y ? p : b);
  return [tl, tr, br, bl]; // clockwise: TL TR BR BL
}

// ─────────────────────────────────────────────
//  PERSPECTIVE CORRECTION
// ─────────────────────────────────────────────
function perspectiveCorrect(srcCanvas, corners) {
  const src = cv.imread(srcCanvas);
  const [tl, tr, br, bl] = corners;

  const dstW = Math.round(Math.max(
    Math.hypot(tr.x - tl.x, tr.y - tl.y),
    Math.hypot(br.x - bl.x, br.y - bl.y)
  ));
  const dstH = Math.round(Math.max(
    Math.hypot(bl.x - tl.x, bl.y - tl.y),
    Math.hypot(br.x - tr.x, br.y - tr.y)
  ));

  const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    tl.x, tl.y,  tr.x, tr.y,  br.x, br.y,  bl.x, bl.y,
  ]);
  const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    0, 0,  dstW, 0,  dstW, dstH,  0, dstH,
  ]);

  const M = cv.getPerspectiveTransform(srcPts, dstPts);
  const dst = new cv.Mat();
  cv.warpPerspective(src, dst, M, new cv.Size(dstW, dstH), cv.INTER_LINEAR);

  const out = makeCanvas(dstW, dstH);
  cv.imshow(out, dst);
  [src, dst, M, srcPts, dstPts].forEach(m => m.delete());
  return out;
}

// ─────────────────────────────────────────────
//  CAPTURE → PROCESS
// ─────────────────────────────────────────────
function capture() {
  const v = el('video');
  S.srcCanvas = makeCanvas(v.videoWidth, v.videoHeight);
  S.srcCanvas.getContext('2d').drawImage(v, 0, 0);
  switchTab('proc');
  processImage(S.detectedCorners);
}

function processImage(corners) {
  if (!S.srcCanvas) return;
  showLoader('Procesando…');

  setTimeout(() => {
    try {
      const detected = corners || detectCorners(S.srcCanvas);
      const lbl = el('det-lbl');

      if (detected) {
        S.baseCanvas = perspectiveCorrect(S.srcCanvas, detected);
        lbl.textContent = 'Auto';
        lbl.style.color = 'var(--ok)';
      } else {
        S.baseCanvas = null;
        lbl.textContent = 'No detectada';
        lbl.style.color = 'var(--gold)';
      }

      el('result-wrap').innerHTML = '';
      resetAdj();
      renderResult();
      setupManual(S.srcCanvas, detected);
      el('btn-save').disabled = !S.baseCanvas;
    } finally { hideLoader(); }
  }, 40);
}

// ─────────────────────────────────────────────
//  ADJUSTMENTS — live preview
// ─────────────────────────────────────────────
function resetAdj() {
  S.adj = { b: 0, c: 0, s: 0 };
  S.negMode = null;
  [['sl-b','vl-b'], ['sl-c','vl-c'], ['sl-s','vl-s']].forEach(([sl, vl]) => {
    el(sl).value = 0; el(vl).textContent = 0;
  });
  el('tog-bw').classList.remove('active');
  el('tog-color').classList.remove('active');
}

function buildFilter() {
  const { b, c, s } = S.adj;
  let f = `brightness(${1 + b / 100}) contrast(${(c + 100) / 100}) saturate(${(s + 100) / 100})`;
  if (S.negMode === 'bw')    f += ' invert(1) grayscale(1)';
  if (S.negMode === 'color') f += ' invert(1)';
  return f;
}

function applyAdj(srcCanvas) {
  if (!srcCanvas) return null;
  const out = makeCanvas(srcCanvas.width, srcCanvas.height);
  const ctx = out.getContext('2d');
  ctx.filter = buildFilter();
  ctx.drawImage(srcCanvas, 0, 0);
  ctx.filter = 'none';
  return out;
}

function renderResult() {
  const wrap = el('result-wrap');
  if (!S.baseCanvas) {
    wrap.innerHTML = '<div class="empty-msg">No se detectó la foto.<br>Usa el ajuste manual abajo.</div>';
    return;
  }

  // Use <img> so object-fit:contain works and CSS filter is instant
  let img = wrap.querySelector('img.result-img');
  if (!img) {
    wrap.innerHTML = '';
    img = document.createElement('img');
    img.className = 'result-img';
    // Convert base canvas to data URL once; filter applied via CSS
    img.src = S.baseCanvas.toDataURL('image/jpeg', 0.95);
    wrap.appendChild(img);
  }

  img.style.filter = buildFilter();
}

// Slider listeners
[['sl-b', 'vl-b', 'b'], ['sl-c', 'vl-c', 'c'], ['sl-s', 'vl-s', 's']].forEach(([slId, vlId, key]) => {
  el(slId)?.addEventListener('input', () => {
    const v = parseInt(el(slId).value);
    S.adj[key] = v;
    el(vlId).textContent = v;
    renderResult(); // live update
  });
});

// ─────────────────────────────────────────────
//  MANUAL CROP
// ─────────────────────────────────────────────
let manPts = [];

function setupManual(srcCanvas, autoCorners) {
  const sec = el('manual-sec');
  const stage = el('manual-stage');
  const canvas = el('manual-canvas');

  // Show section first so getBoundingClientRect returns real dimensions
  sec.style.display = 'block';
  stage.querySelectorAll('.c-dot').forEach(d => d.remove());

  // Limit display size: fit width AND cap height at 260px to stay on screen
  const containerW = stage.parentElement.getBoundingClientRect().width || (window.innerWidth - 32);
  const MAX_H = 400;
  const scByW = Math.min(containerW, srcCanvas.width) / srcCanvas.width;
  const scByH = MAX_H / srcCanvas.height;
  const sc = Math.min(scByW, scByH);

  const dW = Math.round(srcCanvas.width * sc);
  const dH = Math.round(srcCanvas.height * sc);

  canvas.width = srcCanvas.width;
  canvas.height = srcCanvas.height;
  canvas.style.width = dW + 'px';
  canvas.style.height = dH + 'px';
  canvas.getContext('2d').drawImage(srcCanvas, 0, 0);

  const R = 13;
  const cx = (x) => clamp(x, R, dW - R);
  const cy = (y) => clamp(y, R, dH - R);
  const pad = 0.12;

  if (autoCorners) {
    manPts = autoCorners.map(p => ({ x: cx(p.x * sc), y: cy(p.y * sc) }));
  } else {
    manPts = [
      { x: cx(dW * pad),       y: cy(dH * pad) },
      { x: cx(dW * (1 - pad)), y: cy(dH * pad) },
      { x: cx(dW * (1 - pad)), y: cy(dH * (1 - pad)) },
      { x: cx(dW * pad),       y: cy(dH * (1 - pad)) },
    ];
  }

  manPts.forEach((pt, i) => {
    const dot = document.createElement('div');
    dot.className = 'c-dot';
    dot.style.left = pt.x + 'px';
    dot.style.top = pt.y + 'px';
    stage.appendChild(dot);
    attachDrag(dot, i, dW, dH, R);
  });

  updatePoly();
}

function attachDrag(el_, idx, maxW, maxH, R = 13) {
  let sx, sy, ox, oy;
  const start = e => {
    e.preventDefault();
    const t = e.touches?.[0] ?? e;
    sx = t.clientX; sy = t.clientY;
    ox = manPts[idx].x; oy = manPts[idx].y;
    on(document, 'mousemove touchmove', move, { passive: false });
    on(document, 'mouseup touchend', end);
  };
  const move = e => {
    e.preventDefault();
    const t = e.touches?.[0] ?? e;
    manPts[idx] = {
      x: clamp(ox + t.clientX - sx, R, maxW - R),
      y: clamp(oy + t.clientY - sy, R, maxH - R),
    };
    el_.style.left = manPts[idx].x + 'px';
    el_.style.top  = manPts[idx].y + 'px';
    updatePoly();
    showLoupe(t.clientX, t.clientY, idx);
  };
  const end = () => {
    off(document, 'mousemove touchmove', move);
    off(document, 'mouseup touchend', end);
    hideLoupe();
  };
  on(el_, 'mousedown touchstart', start, { passive: false });
}

function showLoupe(screenX, screenY, idx) {
  const loupe = el('loupe');
  const lc = el('loupe-canvas');
  const src = el('manual-canvas');
  const D = 120, ZOOM = 2, CROP = D / ZOOM; // 60 source-px visible

  const dW = parseFloat(src.style.width);
  const dH = parseFloat(src.style.height);
  const scX = src.width / dW;
  const scY = src.height / dH;
  const cx = manPts[idx].x * scX;
  const cy = manPts[idx].y * scY;

  lc.width = D; lc.height = D;
  const ctx = lc.getContext('2d');

  // Circular clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(D / 2, D / 2, D / 2, 0, Math.PI * 2);
  ctx.clip();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(src, cx - CROP / 2, cy - CROP / 2, CROP, CROP, 0, 0, D, D);
  ctx.restore();

  // Crosshair
  ctx.strokeStyle = 'rgba(245,197,24,.85)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(D / 2, 4); ctx.lineTo(D / 2, D - 4);
  ctx.moveTo(4, D / 2); ctx.lineTo(D - 4, D / 2);
  ctx.stroke();

  // Position above finger, keep inside viewport
  const top = Math.max(8, screenY - D - 24);
  loupe.style.left = clamp(screenX - D / 2, 8, window.innerWidth - D - 8) + 'px';
  loupe.style.top  = top + 'px';
  loupe.style.display = 'block';
}

function hideLoupe() { el('loupe').style.display = 'none'; }

function updatePoly() {
  el('manual-poly').setAttribute('points', manPts.map(p => `${p.x},${p.y}`).join(' '));
}

function applyManual() {
  if (!S.srcCanvas) return;
  const canvas = el('manual-canvas');
  // Use actual rendered size (getBoundingClientRect) — avoids mismatch
  // when CSS constrains the canvas differently from style.width
  const rect = canvas.getBoundingClientRect();
  const scX = canvas.width  / rect.width;
  const scY = canvas.height / rect.height;
  const imgCorners = manPts.map(p => ({ x: p.x * scX, y: p.y * scY }));

  showLoader('Aplicando recorte manual…');
  setTimeout(() => {
    try {
      S.baseCanvas = perspectiveCorrect(S.srcCanvas, imgCorners);
      el('det-lbl').textContent = 'Manual';
      el('det-lbl').style.color = 'var(--gold)';
      el('result-wrap').innerHTML = '';
      renderResult();
      el('btn-save').disabled = false;
      toast('Recorte aplicado');
    } finally { hideLoader(); }
  }, 40);
}

// ─────────────────────────────────────────────
//  SAVE
// ─────────────────────────────────────────────
function savePhoto() {
  const final = applyAdj(S.baseCanvas) || S.baseCanvas;
  if (!final) return;

  const dataUrl = final.toDataURL('image/jpeg', 0.93);
  S.gallery.unshift({ dataUrl, ts: new Date().toISOString(), id: Date.now() });
  localStorage.setItem('pt_gal', JSON.stringify(S.gallery));
  renderGallery();

  const a = document.createElement('a');
  a.download = `phototake_${Date.now()}.jpg`;
  a.href = dataUrl;
  a.click();

  toast('Guardada y descargada');
  switchTab('gal');
}

// ─────────────────────────────────────────────
//  GALLERY
// ─────────────────────────────────────────────
function renderGallery() {
  el('gal-n').textContent = S.gallery.length;
  const grid = el('gal-grid');
  if (!S.gallery.length) {
    grid.innerHTML = '<div class="gal-empty">Sin fotos aún.<br>Captura tu primera foto revelada.</div>';
    return;
  }
  grid.innerHTML = S.gallery.map(item => `
    <div class="gal-item">
      <img src="${item.dataUrl}" loading="lazy" alt="">
      <div class="gal-overlay"></div>
      <div class="gal-date">${fmtDate(item.ts)}</div>
      <div class="gal-acts">
        <button class="gal-act-btn" onclick="dlPhoto('${item.id}')">↓</button>
        <button class="gal-act-btn" onclick="delPhoto('${item.id}')">×</button>
      </div>
    </div>`).join('');
}

function dlPhoto(id) {
  const item = S.gallery.find(i => String(i.id) === String(id));
  if (!item) return;
  const a = document.createElement('a');
  a.download = `phototake_${id}.jpg`; a.href = item.dataUrl; a.click();
}

function delPhoto(id) {
  S.gallery = S.gallery.filter(i => String(i.id) !== String(id));
  localStorage.setItem('pt_gal', JSON.stringify(S.gallery));
  renderGallery();
  toast('Eliminada');
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ─────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === id + '-panel'));
  if (id === 'cam') { if (!S.stream) startCam(); else startLoop(); }
  else stopLoop();
}

// ─────────────────────────────────────────────
//  TORCH
// ─────────────────────────────────────────────
async function toggleTorch() {
  if (!S.stream) return;
  const track = S.stream.getVideoTracks()[0];
  if (!track?.getCapabilities?.().torch) { toast('Linterna no disponible'); return; }
  S.torch = !S.torch;
  await track.applyConstraints({ advanced: [{ torch: S.torch }] });
  el('btn-torch').textContent = S.torch ? '●' : '⚡';
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
//  WIRE UP EVENTS
// ─────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
el('btn-cap').addEventListener('click', capture);
el('btn-flip').addEventListener('click', () => { S.facing = S.facing === 'environment' ? 'user' : 'environment'; startCam(); });
el('btn-torch').addEventListener('click', toggleTorch);
el('btn-save').addEventListener('click', savePhoto);
el('btn-retake').addEventListener('click', () => switchTab('cam'));
el('btn-apply-man').addEventListener('click', applyManual);

['bw', 'color'].forEach(mode => {
  el('tog-' + mode).addEventListener('click', () => {
    S.negMode = S.negMode === mode ? null : mode;
    el('tog-bw').classList.toggle('active', S.negMode === 'bw');
    el('tog-color').classList.toggle('active', S.negMode === 'color');
    renderResult();
  });
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderGallery();
setTimeout(() => { if (!S.cvReady) setStatus('Error', ''); }, 10000);
</script>
</body>
